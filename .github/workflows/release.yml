name: Release

on:
    push:
        tags:
            - "v*"

permissions:
    contents: write

env:
    CARGO_TERM_COLOR: always
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    build:
        strategy:
            matrix:
                include:
                    - os: ubuntu-latest
                      target: x86_64-unknown-linux-gnu
                      artifact: compilador-linux-amd64
                    - os: ubuntu-latest
                      target: aarch64-unknown-linux-gnu
                      artifact: compilador-linux-arm64
                      cross: true
                    - os: macos-latest
                      target: x86_64-apple-darwin
                      artifact: compilador-macos-amd64
                    - os: macos-latest
                      target: aarch64-apple-darwin
                      artifact: compilador-macos-arm64
                    - os: windows-latest
                      target: x86_64-pc-windows-msvc
                      artifact: compilador-windows-amd64.exe

        runs-on: ${{ matrix.os }}

        steps:
            - uses: actions/checkout@v6

            - name: Instalar Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}

            - name: Instalar cross
              if: matrix.cross
              run: cargo install cross

            - name: Build
              shell: bash
              run: |
                  if [ "${{ matrix.cross }}" = "true" ]; then
                    cross build --release --target ${{ matrix.target }}
                  else
                    cargo build --release --target ${{ matrix.target }}
                  fi

            - name: Renomear binário
              shell: bash
              run: |
                  if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
                    cp target/${{ matrix.target }}/release/Compilador.exe ${{ matrix.artifact }}
                  else
                    cp target/${{ matrix.target }}/release/Compilador ${{ matrix.artifact }}
                    chmod +x ${{ matrix.artifact }}
                  fi

            - name: Upload artefato
              uses: actions/upload-artifact@v6
              with:
                  name: ${{ matrix.artifact }}
                  path: ${{ matrix.artifact }}

    release:
        needs: build
        runs-on: ubuntu-latest

        steps:
            - name: Baixar artefatos
              uses: actions/download-artifact@v8
              with:
                  path: artifacts
                  merge-multiple: true

            - name: Criar release
              uses: softprops/action-gh-release@v2
              with:
                  files: artifacts/*
                  generate_release_notes: true
